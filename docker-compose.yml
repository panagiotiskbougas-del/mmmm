version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beam-backend
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: beam-web
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

networks:
  default:
    name: beam-net
